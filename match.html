<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Match — WCPredict</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f3f0e8;--ink:#232019;--ink-2:#5a554a;--ink-3:#8f897a;
    --line:rgba(35,32,25,0.14);--line-2:rgba(35,32,25,0.08);
    --clay:#b15a3c;--turf:#3f8055;--draw:#9a9384;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;
    background-image:radial-gradient(120% 120% at 50% -10%,rgba(255,255,255,.5) 0%,rgba(243,240,232,0) 45%);}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;padding:0 clamp(20px,5vw,40px);}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:24px 0;}
  .word{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.01em;}
  .word .p{color:var(--clay);}
  .status{display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink-3);text-transform:uppercase;}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--turf);}
  .back{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);display:inline-block;padding:16px 0 6px;border-top:1px solid var(--line-2);}
  .back:hover{color:var(--clay);}

  .meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin:10px 0 14px;}
  .score-head{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;margin-bottom:8px;}
  .sh-team{display:flex;flex-direction:column;gap:6px;}
  .sh-team.away{align-items:flex-end;text-align:right;}
  .sh-team .cd{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,7vw,56px);letter-spacing:-.01em;line-height:1;}
  .sh-team .nm{font-size:14px;color:var(--ink-2);}
  .sh-team .elo{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);}
  .sh-mid{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:70px;}
  .sh-mid .sc{font-family:'Fraunces',serif;font-weight:600;font-size:32px;}
  .sh-mid .vs{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--ink-3);}
  .sh-mid .ft{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--ink-3);text-transform:uppercase;}

  section.blk{border-top:1px solid var(--line-2);padding:26px 0;}
  .blk h2{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px;}

  .pbar{display:flex;height:8px;border-radius:5px;overflow:hidden;background:var(--line-2);}
  .pbar span{display:block;}.pbar .h{background:var(--clay);}.pbar .d{background:var(--draw);}.pbar .a{background:var(--ink);}
  .plabels{display:flex;justify-content:space-between;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ink-3);}
  .plabels b{color:var(--ink);font-weight:500;}.plabels .fav b{color:var(--clay);}
  .xg{display:flex;gap:26px;margin-top:20px;font-size:14px;color:var(--ink-2);}
  .xg b{font-family:'Fraunces',serif;font-size:20px;color:var(--ink);font-weight:600;}
  .scorelines{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
  .scoreline{border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;}
  .scoreline b{color:var(--ink-3);font-weight:400;margin-left:6px;}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:34px;}
  .col h3{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;color:var(--ink);margin-bottom:12px;}
  .form{display:flex;gap:6px;flex-wrap:wrap;}
  .form .g{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .form i{width:24px;height:24px;border-radius:5px;font-style:normal;font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;justify-content:center;color:#fff;}
  .form i.W{background:var(--turf);}.form i.D{background:var(--draw);}.form i.L{background:var(--clay);}
  .form .g small{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-3);}

  .h2h-rec{display:flex;gap:22px;font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:12px;}
  .h2h-rec div{display:flex;flex-direction:column;gap:3px;}
  .h2h-rec b{font-family:'Fraunces',serif;font-size:24px;font-weight:600;}
  .h2h-rec small{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);}
  .h2h-last{font-size:13px;color:var(--ink-2);}

  .lu{display:grid;grid-template-columns:1fr 1fr;gap:34px;}
  .lu .formation{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--clay);margin-bottom:10px;}
  .lu ul{list-style:none;}
  .lu li{display:flex;gap:10px;padding:5px 0;font-size:13px;border-bottom:1px solid var(--line-2);}
  .lu li .no{font-family:'JetBrains Mono',monospace;color:var(--ink-3);width:24px;}
  .lu li .ps{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3);}
  .pending{color:var(--ink-3);font-family:'Fraunces',serif;font-style:italic;font-size:16px;}

  footer{padding:30px 0;border-top:1px solid var(--line-2);font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:var(--ink-3);text-transform:uppercase;}
  @media(max-width:560px){.cols,.lu{grid-template-columns:1fr;gap:24px;}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <a class="word" href="index.html">WC<span class="p">Predict</span></a>
      <div class="status" id="status"><span class="dot"></span> Live</div>
    </div>
    <a class="back" href="today.html">‹ Match centre</a>
    <div id="body"></div>
    <footer id="foot">WCPREDICT</footer>
  </div>

<script>
const pct=x=>(x*100).toFixed(0)+"%";
const qp=new URLSearchParams(location.search);
const wantNo=parseInt(qp.get("m"));

const FALLBACK={generated_utc:new Date().toISOString(),matches:[{
  match_no:31,date:new Date().toISOString().slice(0,10),kickoff_utc:null,stage:"group",group:"J",neutral:true,status:"upcoming",score:null,
  venue:{city:"East Rutherford",country:"United States"},
  home:{team:"Argentina",code:"ARG",elo:2200,form:[{res:"W",opp:"BRA",score:"2-1"},{res:"W",opp:"CHI",score:"3-0"},{res:"D",opp:"URU",score:"1-1"},{res:"W",opp:"PER",score:"2-0"},{res:"W",opp:"ECU",score:"1-0"}]},
  away:{team:"Algeria",code:"ALG",elo:1855,form:[{res:"L",opp:"MAR",score:"0-2"},{res:"D",opp:"TUN",score:"1-1"},{res:"W",opp:"MLI",score:"2-1"},{res:"L",opp:"EGY",score:"0-1"},{res:"D",opp:"GHA",score:"0-0"}]},
  prediction:{home_win:0.78,draw:0.14,away_win:0.08,exp_goals_home:2.4,exp_goals_away:0.7,favourite_code:"ARG",top_scorelines:[{score:"2-0",prob:0.17},{score:"1-0",prob:0.12},{score:"3-0",prob:0.10},{score:"2-1",prob:0.09}]},
  h2h:{played:3,wins:2,draws:1,losses:0,last:{date:"2022-06-01",score:"5-0",res:"W"},recent:[]}
}]};

let DATA=null,LU={};

function relTime(iso){
  const t=new Date(iso); if(isNaN(t))return null;
  const s=Math.floor((Date.now()-t)/1000);
  if(s<90)return "just now";
  const m=Math.floor(s/60); if(m<60)return m+"m ago";
  const h=Math.floor(m/60); if(h<24)return h+"h ago";
  return Math.floor(h/24)+"d ago";
}
function setStatus(iso){
  const r=iso?relTime(iso):null;
  document.getElementById("status").innerHTML =
    `<span class="dot"></span> ${r?("Updated "+r+" · "):""}refreshes every 6h`;
}

async function getJSON(paths){
  for(const u of paths){ try{const r=await fetch(u,{cache:"no-store"}); if(r.ok)return await r.json();}catch(e){} }
  return null;
}

async function load(){
  DATA=await getJSON(["data/fixtures.json","https://raw.githubusercontent.com/AayushSharma1003/WCPredict/main/data/fixtures.json"]) || FALLBACK;
  const luData=await getJSON(["data/lineups.json","https://raw.githubusercontent.com/AayushSharma1003/WCPredict/main/data/lineups.json"]);
  LU=(luData&&luData.lineups)||{};
  setStatus(DATA.generated_utc);

  const m = DATA.matches.find(x=>x.match_no===wantNo) || DATA.matches[0];
  if(!m){ document.getElementById("body").innerHTML='<section class="blk"><p class="pending">Match not found.</p></section>'; return; }
  render(m);
}

function fmtKO(iso){ if(!iso)return null; const t=new Date(iso); return isNaN(t)?null:t.toLocaleString(undefined,{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
function formBlock(form){
  return `<div class="form">${(form||[]).slice(-5).map(f=>`<div class="g"><i class="${f.res}">${f.res}</i><small>${f.opp||""}</small></div>`).join("")}</div>`;
}

function render(m){
  const p=m.prediction, ko=fmtKO(m.kickoff_utc);
  const meta=[m.stage==="group"?`Group ${m.group}`:(m.stage||"").toUpperCase(),
              ko||m.date, m.venue&&m.venue.city?`${m.venue.city}${m.venue.country?", "+m.venue.country:""}`:null].filter(Boolean).join("  ·  ");

  const mid = m.status==="played"&&m.score
    ? `<div class="sc">${m.score.home}–${m.score.away}</div><div class="ft">Full time</div>`
    : `<div class="vs">v</div>`;

  let pred="";
  if(p){
    const favH=p.favourite_code===m.home.code, favA=p.favourite_code===m.away.code;
    pred=`<section class="blk"><h2>${m.status==="played"?"Pre-match model":"Model prediction"}</h2>
      <div class="pbar"><span class="h" style="width:${p.home_win*100}%"></span><span class="d" style="width:${p.draw*100}%"></span><span class="a" style="width:${p.away_win*100}%"></span></div>
      <div class="plabels">
        <span class="${favH?'fav':''}">${m.home.code} <b>${pct(p.home_win)}</b></span>
        <span>Draw <b>${pct(p.draw)}</b></span>
        <span class="${favA?'fav':''}">${m.away.code} <b>${pct(p.away_win)}</b></span>
      </div>
      <div class="xg"><span>Expected goals&nbsp; <b>${p.exp_goals_home}</b> – <b>${p.exp_goals_away}</b></span></div>
      ${p.top_scorelines&&p.top_scorelines.length?`<div class="scorelines">${p.top_scorelines.map(s=>`<span class="scoreline">${s.score}<b>${pct(s.prob)}</b></span>`).join("")}</div>`:""}
    </section>`;
  }

  const h=m.h2h||{};
  const h2h = h.played ? `<section class="blk"><h2>Head to head</h2>
      <div class="h2h-rec">
        <div><b>${h.wins||0}</b><small>${m.home.code} wins</small></div>
        <div><b>${h.draws||0}</b><small>Draws</small></div>
        <div><b>${h.losses||0}</b><small>${m.away.code} wins</small></div>
      </div>
      ${h.last?`<div class="h2h-last">Last meeting · ${h.last.date} · ${h.last.score}</div>`:""}
    </section>` :
    `<section class="blk"><h2>Head to head</h2><p class="pending">No prior meetings on record.</p></section>`;

  // lineups
  const key=`${m.date}|${m.home.team}|${m.away.team}`;
  const lu=LU[key];
  let luBlock;
  if(lu&&lu.status==="confirmed"){
    const sideHTML=(side,team)=> side&&side.xi&&side.xi.length ? `<div class="col">
        <h3>${team}</h3>
        ${side.formation?`<div class="formation">${side.formation}</div>`:""}
        <ul>${side.xi.map(p=>`<li><span class="no">${p.number??""}</span><span>${p.name||""}</span><span class="ps">${p.pos||""}</span></li>`).join("")}</ul>
      </div>` : `<div class="col"><h3>${team}</h3><p class="pending">—</p></div>`;
    luBlock=`<section class="blk"><h2>Confirmed lineups</h2><div class="lu">${sideHTML(lu.home,m.home.team)}${sideHTML(lu.away,m.away.team)}</div></section>`;
  } else {
    luBlock=`<section class="blk"><h2>Lineups</h2><p class="pending">Confirmed XIs are published about an hour before kickoff — check back closer to the match.</p></section>`;
  }

  document.getElementById("body").innerHTML=`
    <div class="meta">${meta}</div>
    <div class="score-head">
      <div class="sh-team home"><span class="cd">${m.home.code}</span><span class="nm">${m.home.team}</span><span class="elo">Elo ${Math.round(m.home.elo)}</span></div>
      <div class="sh-mid">${mid}</div>
      <div class="sh-team away"><span class="cd">${m.away.code}</span><span class="nm">${m.away.team}</span><span class="elo">Elo ${Math.round(m.away.elo)}</span></div>
    </div>
    ${pred}
    <section class="blk"><h2>Recent form</h2><div class="cols">
      <div class="col"><h3>${m.home.team}</h3>${formBlock(m.home.form)}</div>
      <div class="col"><h3>${m.away.team}</h3>${formBlock(m.away.form)}</div>
    </div></section>
    ${h2h}
    ${luBlock}`;
  document.getElementById("foot").innerHTML=`WCPREDICT · <a href="bracket.html">Full bracket →</a>`;
}

load();
</script>
</body>
</html>
