<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Predicted bracket — WCPredict</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#f3f0e8;--ink:#232019;--ink-2:#5a554a;--ink-3:#8f897a;
    --line:rgba(35,32,25,0.14);--line-2:rgba(35,32,25,0.08);--clay:#b15a3c;--turf:#3f8055;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;
    background-image:radial-gradient(120% 120% at 50% -10%,rgba(255,255,255,.5) 0%,rgba(243,240,232,0) 45%);}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 clamp(20px,5vw,40px);}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:24px 0;}
  .word{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.01em;}
  .word .p{color:var(--clay);}
  .status{display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink-3);text-transform:uppercase;}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--turf);}
  header.page{border-top:1px solid var(--line-2);padding:18px 0 6px;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--ink-3);text-transform:uppercase;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(30px,5vw,46px);letter-spacing:-.02em;margin-top:8px;}
  .sub{color:var(--ink-2);font-size:15px;max-width:560px;margin-top:8px;}

  .tabs{display:flex;gap:8px;margin:22px 0 8px;}
  .tabs button{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);
    background:none;border:1px solid var(--line);border-radius:999px;padding:9px 16px;cursor:pointer;transition:.15s;}
  .tabs button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  /* bracket */
  .scroller{overflow-x:auto;padding:18px 0 8px;}
  .bracket{display:flex;gap:18px;min-width:900px;}
  .col{flex:1;min-width:150px;}
  .col h3{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px;text-align:center;}
  .col-inner{display:flex;flex-direction:column;justify-content:space-around;height:100%;gap:10px;}
  .bm{border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.28);overflow:hidden;}
  .bm-s{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;font-size:13px;}
  .bm-s+.bm-s{border-top:1px solid var(--line-2);}
  .bm-s .c{font-family:'JetBrains Mono',monospace;font-weight:500;letter-spacing:.04em;}
  .bm-s .pp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);}
  .bm-s.top .c{color:var(--ink);} .bm-s.lead .c,.bm-s.lead .pp{color:var(--clay);}

  /* road to the cup */
  .road{padding:18px 0;}
  .champ-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
  .champ-pick button{font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:8px 13px;background:none;cursor:pointer;color:var(--ink-2);transition:.15s;}
  .champ-pick button.on{background:var(--clay);color:#f7f2ea;border-color:var(--clay);}
  .champ-head{font-family:'Fraunces',serif;font-size:22px;margin-bottom:4px;}
  .champ-head b{color:var(--clay);}
  .champ-sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:22px;}
  .route{position:relative;max-width:520px;}
  .step{display:flex;align-items:center;gap:16px;padding:14px 0;border-top:1px solid var(--line-2);}
  .step .rd{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);width:44px;text-transform:uppercase;}
  .step .opp{flex:1;}
  .step .opp .cd{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:15px;}
  .step .opp .nm{font-size:12px;color:var(--ink-2);margin-left:8px;}
  .step .pp{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-3);}
  .step.final .rd{color:var(--clay);}

  footer{padding:30px 0;border-top:1px solid var(--line-2);margin-top:24px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:var(--ink-3);text-transform:uppercase;}
  footer a{border-bottom:1px solid var(--line);}
  .pending{color:var(--ink-3);font-family:'Fraunces',serif;font-style:italic;font-size:16px;padding:30px 0;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <a class="word" href="index.html">WC<span class="p">Predict</span></a>
      <div class="status" id="status"><span class="dot"></span> Live</div>
    </div>
    <header class="page">
      <div class="eyebrow">10,000 simulated tournaments</div>
      <h1>The predicted bracket</h1>
      <p class="sub">The most likely team to fill each knockout slot, and each contender's most probable road to the trophy. Rebuilt every six hours.</p>
    </header>

    <div class="tabs">
      <button id="tabBracket" class="on">Full bracket</button>
      <button id="tabRoad">Road to the cup</button>
    </div>

    <div id="bracketView" class="scroller"></div>
    <div id="roadView" class="road" style="display:none"></div>

    <footer>WCPREDICT · <a href="today.html">Today's matches →</a></footer>
  </div>

<script>
const CODES={"Argentina":"ARG","Algeria":"ALG","Australia":"AUS","Austria":"AUT","Belgium":"BEL","Bosnia and Herzegovina":"BIH","Brazil":"BRA","Canada":"CAN","Cape Verde":"CPV","Colombia":"COL","Croatia":"CRO","Curaçao":"CUW","Czech Republic":"CZE","DR Congo":"COD","Ecuador":"ECU","Egypt":"EGY","England":"ENG","France":"FRA","Germany":"GER","Ghana":"GHA","Haiti":"HAI","Iran":"IRN","Iraq":"IRQ","Ivory Coast":"CIV","Japan":"JPN","Jordan":"JOR","Mexico":"MEX","Morocco":"MAR","Netherlands":"NED","New Zealand":"NZL","Norway":"NOR","Panama":"PAN","Paraguay":"PAR","Portugal":"POR","Qatar":"QAT","Saudi Arabia":"KSA","Scotland":"SCO","Senegal":"SEN","South Africa":"RSA","South Korea":"KOR","Spain":"ESP","Sweden":"SWE","Switzerland":"SUI","Tunisia":"TUN","Turkey":"TUR","United States":"USA","Uruguay":"URU","Uzbekistan":"UZB"};
const code=t=>CODES[t]||(t||"").slice(0,3).toUpperCase();
const pct=x=>(x*100).toFixed(0)+"%";
const ROUND_LABEL={R32:"Round of 32",R16:"Round of 16",QF:"Quarter-finals",SF:"Semi-finals",F:"Final"};

const FB_BRACKET={rounds:[{name:"F",matches:[{sides:[{modal_team:"Argentina",modal_prob:.29},{modal_team:"Spain",modal_prob:.22}]}]}]};
const FB_ROUTES={champions:[{team:"Argentina",cup_prob:.219,modal_route:[
  {round:"R32",modal_opponent:"Uruguay",modal_prob_given_champ:.33},
  {round:"R16",modal_opponent:"Australia",modal_prob_given_champ:.19},
  {round:"QF",modal_opponent:"Colombia",modal_prob_given_champ:.30},
  {round:"SF",modal_opponent:"England",modal_prob_given_champ:.21},
  {round:"F",modal_opponent:"Spain",modal_prob_given_champ:.18}]}]};

let BRACKET=null,ROUTES=null,curChamp=0;

async function getJSON(paths){for(const u of paths){try{const r=await fetch(u,{cache:"no-store"});if(r.ok)return await r.json();}catch(e){}}return null;}
function relTime(iso){const t=new Date(iso);if(isNaN(t))return null;const s=Math.floor((Date.now()-t)/1000);if(s<90)return"just now";const m=Math.floor(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago";}

async function load(){
  const base="https://raw.githubusercontent.com/AayushSharma1003/WCPredict/main/data/";
  BRACKET=await getJSON(["data/bracket_view.json",base+"bracket_view.json"])||FB_BRACKET;
  ROUTES =await getJSON(["data/champion_routes.json",base+"champion_routes.json"])||FB_ROUTES;
  const fx=await getJSON(["data/fixtures.json",base+"fixtures.json"]);
  const r=fx&&fx.generated_utc?relTime(fx.generated_utc):null;
  document.getElementById("status").innerHTML=`<span class="dot"></span> ${r?("Updated "+r+" · "):""}refreshes every 6h`;
  renderBracket(); renderRoad();
}

function renderBracket(){
  const order=["R32","R16","QF","SF","F"];
  const rounds=order.map(n=>(BRACKET.rounds||[]).find(r=>r.name===n)).filter(Boolean);
  document.getElementById("bracketView").innerHTML=`<div class="bracket">${rounds.map(rd=>`
    <div class="col"><h3>${ROUND_LABEL[rd.name]||rd.name}</h3><div class="col-inner">
      ${rd.matches.map(mt=>{
        const a=mt.sides[0]||{},b=mt.sides[1]||{};
        const aLead=(a.modal_prob||0)>=(b.modal_prob||0);
        return `<div class="bm">
          <div class="bm-s top ${aLead?'lead':''}"><span class="c">${code(a.modal_team)}</span><span class="pp">${a.modal_prob!=null?pct(a.modal_prob):""}</span></div>
          <div class="bm-s ${!aLead?'lead':''}"><span class="c">${code(b.modal_team)}</span><span class="pp">${b.modal_prob!=null?pct(b.modal_prob):""}</span></div>
        </div>`;
      }).join("")}
    </div></div>`).join("")}</div>`;
}

function renderRoad(){
  const champs=ROUTES.champions||[];
  if(!champs.length){document.getElementById("roadView").innerHTML='<p class="pending">No route data.</p>';return;}
  const pick=`<div class="champ-pick">${champs.slice(0,8).map((c,i)=>`<button class="${i===curChamp?'on':''}" data-i="${i}">${code(c.team)} ${pct(c.cup_prob)}</button>`).join("")}</div>`;
  const c=champs[curChamp];
  const steps=(c.modal_route||[]).map(s=>{
    const isF=s.round==="F";
    return `<div class="step ${isF?'final':''}">
      <span class="rd">${s.round}</span>
      <span class="opp"><span class="cd">${code(s.modal_opponent)}</span><span class="nm">${s.modal_opponent}</span></span>
      <span class="pp">${pct(s.modal_prob_given_champ)} likely</span>
    </div>`;}).join("");
  document.getElementById("roadView").innerHTML=`${pick}
    <div class="champ-head"><b>${c.team}</b> — ${pct(c.cup_prob)} to lift the trophy</div>
    <div class="champ-sub">Most likely opponent at each round, given they win it all</div>
    <div class="route">${steps}</div>`;
  document.querySelectorAll(".champ-pick button").forEach(b=>b.onclick=()=>{curChamp=+b.dataset.i;renderRoad();});
}

document.getElementById("tabBracket").onclick=()=>{
  document.getElementById("tabBracket").classList.add("on");document.getElementById("tabRoad").classList.remove("on");
  document.getElementById("bracketView").style.display="";document.getElementById("roadView").style.display="none";
};
document.getElementById("tabRoad").onclick=()=>{
  document.getElementById("tabRoad").classList.add("on");document.getElementById("tabBracket").classList.remove("on");
  document.getElementById("roadView").style.display="";document.getElementById("bracketView").style.display="none";
};

load();
</script>
</body>
</html>
